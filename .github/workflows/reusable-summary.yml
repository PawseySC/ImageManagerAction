name: Reusable — SUMMARY

on:
  workflow_call:
    inputs:
      main:
        required: true
        type: string
      feature:
        required: true
        type: string
      version:
        required: true
        type: string
      platform:
        required: true
        type: string
      correlation_id:
        required: true
        type: string
      has_template:
        required: true
        type: string
      variant_count:
        required: true
        type: string
      build_matrix:
        required: true
        type: string
      result_prepare:
        required: true
        type: string
      result_build:
        required: true
        type: string
      result_scan:
        required: true
        type: string
      result_test:
        required: false
        type: string
        default: "skipped"
      result_push_priv:
        required: true
        type: string
      result_push_public:
        required: true
        type: string
      result_deploy:
        required: true
        type: string
      targets:
        required: true
        type: string
      private_targets:
        required: true
        type: string
      quayio_available:
        required: true
        type: string
      quayiosc_available:
        required: false
        default: 'false'
        type: string
      setonixreg_available:
        required: true
        type: string
      acacia_bucket:
        required: true
        type: string
      acacia_sif_bucket:
        required: true
        type: string

jobs:
  summary:
    runs-on: ubuntu-latest
    env:
      MAIN: ${{ inputs.main }}
      FEATURE: ${{ inputs.feature }}
      VERSION: ${{ inputs.version }}
      PLATFORM: ${{ inputs.platform }}
      CORRELATION_ID: ${{ inputs.correlation_id }}
      VARIANT_COUNT: ${{ inputs.variant_count }}
      HAS_TEMPLATE: ${{ inputs.has_template }}
    steps:
      - name: Checkout for template access
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Generate variant block
        id: variant_block
        run: |
          if [ "${{ env.HAS_TEMPLATE }}" = "true" ]; then
            cat > /tmp/variant_block.txt <<EOF
          ## 🔀 Multi-Variant Build

          **Variant Count:** ${{ env.VARIANT_COUNT }}

          Matrix configuration generated ${{ env.VARIANT_COUNT }} build variant(s) based on template parameters.
          EOF
          else
            # No variant block for single builds
            echo "" > /tmp/variant_block.txt
          fi

      - name: Generate archive block
        id: archive_block
        run: |
          IMAGE_NAME="${MAIN}-${FEATURE}"

          if [ "${{ env.HAS_TEMPLATE }}" = "true" ]; then
            # Only claim archives were uploaded if BUILD actually succeeded.
            if [ "${{ inputs.result_build }}" = "success" ]; then
              matrix_json='${{ inputs.build_matrix }}'
              echo "> **Note:** This build produced ${{ env.VARIANT_COUNT }} variant(s); each has a separate Docker archive and SIF file." > /tmp/archive_block.txt
              echo "" >> /tmp/archive_block.txt
              echo "**Docker Archives** (\`s3://${{ inputs.acacia_bucket }}/\`) — ✅ uploaded:" >> /tmp/archive_block.txt
              while read image_name; do
                echo "- \`${image_name}_${VERSION}.tar\`" >> /tmp/archive_block.txt
              done < <(echo "$matrix_json" | jq -r '.include[].image_name')
              echo "" >> /tmp/archive_block.txt
              echo "**Singularity SIF Files** (\`s3://${{ inputs.acacia_sif_bucket }}/\`) — ✅ uploaded:" >> /tmp/archive_block.txt
              while read image_name; do
                echo "- \`${image_name}_${VERSION}.sif\`" >> /tmp/archive_block.txt
              done < <(echo "$matrix_json" | jq -r '.include[].image_name')
            else
              echo "> ❌ **Build did not complete** (BUILD result: \`${{ inputs.result_build }}\`). No archives were uploaded to S3." > /tmp/archive_block.txt
            fi
          else
            cat > /tmp/archive_block.txt <<EOF
          | Location | Address | Status |
          |----------|---------|--------|
          EOF

            # S3 Docker Archive Storage
            if [ "${{ inputs.result_build }}" = "success" ]; then
              echo "| S3 Docker Archive | \`s3://${{ inputs.acacia_bucket }}/${IMAGE_NAME}_${VERSION}.tar\` | ✅ Uploaded |" >> /tmp/archive_block.txt
            else
              echo "| S3 Docker Archive | \`s3://${{ inputs.acacia_bucket }}/${IMAGE_NAME}_${VERSION}.tar\` | ❌ Failed |" >> /tmp/archive_block.txt
            fi

            # S3 Singularity SIF Storage
            if [ "${{ inputs.result_build }}" = "success" ]; then
              echo "| S3 Singularity SIF | \`s3://${{ inputs.acacia_sif_bucket }}/${IMAGE_NAME}_${VERSION}.sif\` | ✅ Uploaded |" >> /tmp/archive_block.txt
            else
              echo "| S3 Singularity SIF | \`s3://${{ inputs.acacia_sif_bucket }}/${IMAGE_NAME}_${VERSION}.sif\` | ❌ Failed |" >> /tmp/archive_block.txt
            fi
          fi

      - name: Generate registry block
        id: registry_block
        run: |
          IMAGE_NAME="${MAIN}-${FEATURE}"

          if [ "${{ env.HAS_TEMPLATE }}" = "true" ]; then
            targets='${{ inputs.targets }}'
            private_targets='${{ inputs.private_targets }}'
            private_username=$(echo "$private_targets" | jq -r '.[0] // "unknown"')
            matrix_json='${{ inputs.build_matrix }}'
            echo "> **Note:** ${{ env.VARIANT_COUNT }} variant(s); status shown per registry below." > /tmp/registry_block.txt
            echo "" >> /tmp/registry_block.txt

            # Setonix Private Registry (attempted whenever credentials are available)
            if [ "${{ inputs.result_push_priv }}" = "skipped" ]; then
              echo "### Setonix Private Registry — ⏭️ skipped (no private target selected or credentials unavailable)" >> /tmp/registry_block.txt
              echo "" >> /tmp/registry_block.txt
            elif [ "${{ inputs.setonixreg_available }}" = "true" ]; then
              if [ "${{ inputs.result_push_priv }}" = "success" ]; then
                echo "### Setonix Private Registry — ✅ pushed" >> /tmp/registry_block.txt
                echo "" >> /tmp/registry_block.txt
                while read image_name; do
                  echo "- \`setonix-registry.pawsey.org.au/${private_username}/${image_name}:${VERSION}\`" >> /tmp/registry_block.txt
                done < <(echo "$matrix_json" | jq -r '.include[].image_name')
              else
                echo "### Setonix Private Registry — ❌ not pushed (result: \`${{ inputs.result_push_priv }}\`)" >> /tmp/registry_block.txt
              fi
              echo "" >> /tmp/registry_block.txt
            fi

            # Quay.io (only if in targets)
            if echo "$targets" | jq -e 'contains(["quay.io"])' > /dev/null 2>&1 && [ "${{ inputs.quayio_available }}" = "true" ]; then
              if [ "${{ inputs.result_push_public }}" = "success" ]; then
                echo "### Quay.io Public Registry — ✅ pushed" >> /tmp/registry_block.txt
                echo "" >> /tmp/registry_block.txt
                while read image_name; do
                  echo "- \`quay.io/pawsey/${image_name}:${VERSION}\`" >> /tmp/registry_block.txt
                done < <(echo "$matrix_json" | jq -r '.include[].image_name')
              else
                echo "### Quay.io Public Registry — ❌ not pushed (result: \`${{ inputs.result_push_public }}\`)" >> /tmp/registry_block.txt
              fi
              echo "" >> /tmp/registry_block.txt
            fi

            # Quay.io pawseysc (only if in targets)
            if echo "$targets" | jq -e 'contains(["quayio-pawseysc"])' > /dev/null 2>&1 && [ "${{ inputs.quayiosc_available }}" = "true" ]; then
              if [ "${{ inputs.result_push_public }}" = "success" ]; then
                echo "### Quay.io (pawseysc) Public Registry — ✅ pushed" >> /tmp/registry_block.txt
                echo "" >> /tmp/registry_block.txt
                while read image_name; do
                  echo "- \`quay.io/pawseysc/${image_name}:${VERSION}\`" >> /tmp/registry_block.txt
                done < <(echo "$matrix_json" | jq -r '.include[].image_name')
              else
                echo "### Quay.io (pawseysc) Public Registry — ❌ not pushed (result: \`${{ inputs.result_push_public }}\`)" >> /tmp/registry_block.txt
              fi
              echo "" >> /tmp/registry_block.txt
            fi

            # Setonix Public (only if in targets)
            if echo "$targets" | jq -e 'contains(["setonix-registry"])' > /dev/null 2>&1 && [ "${{ inputs.setonixreg_available }}" = "true" ]; then
              if [ "${{ inputs.result_push_public }}" = "success" ]; then
                echo "### Setonix Public Registry — ✅ pushed" >> /tmp/registry_block.txt
                echo "" >> /tmp/registry_block.txt
                while read image_name; do
                  echo "- \`setonix-registry.pawsey.org.au/pawsey/${image_name}:${VERSION}\`" >> /tmp/registry_block.txt
                done < <(echo "$matrix_json" | jq -r '.include[].image_name')
              else
                echo "### Setonix Public Registry — ❌ not pushed (result: \`${{ inputs.result_push_public }}\`)" >> /tmp/registry_block.txt
              fi
              echo "" >> /tmp/registry_block.txt
            fi
          else
            cat > /tmp/registry_block.txt <<EOF
          | Registry | Address | Status |
          |----------|---------|--------|
          EOF

            # Parse configured targets
            targets='${{ inputs.targets }}'

            # Setonix Private Registry (always attempted if credentials available)
            private_targets='${{ inputs.private_targets }}'
            private_username=$(echo "$private_targets" | jq -r '.[0] // "unknown"')
            if [ "${{ inputs.result_push_priv }}" = "skipped" ]; then
              echo "| Setonix Private | — | ⏭️ Skipped (no private target or credentials unavailable) |" >> /tmp/registry_block.txt
            elif [ "${{ inputs.setonixreg_available }}" = "true" ] && [ "${{ inputs.result_push_priv }}" = "success" ]; then
              echo "| Setonix Private | \`setonix-registry.pawsey.org.au/${private_username}/${IMAGE_NAME}:${VERSION}\` | ✅ Pushed |" >> /tmp/registry_block.txt
            elif [ "${{ inputs.setonixreg_available }}" = "true" ]; then
              echo "| Setonix Private | \`setonix-registry.pawsey.org.au/${private_username}/${IMAGE_NAME}:${VERSION}\` | ❌ Failed |" >> /tmp/registry_block.txt
            else
              echo "| Setonix Private | \`setonix-registry.pawsey.org.au/${private_username}/${IMAGE_NAME}:${VERSION}\` | ⏭️ Skipped (No credentials) |" >> /tmp/registry_block.txt
            fi

            # Quay.io (only if in targets)
            if echo "$targets" | jq -e 'contains(["quay.io"])' > /dev/null 2>&1; then
              if [ "${{ inputs.quayio_available }}" = "true" ] && [ "${{ inputs.result_push_public }}" = "success" ]; then
                echo "| Quay.io | \`quay.io/pawsey/${IMAGE_NAME}:${VERSION}\` | ✅ Pushed |" >> /tmp/registry_block.txt
              elif [ "${{ inputs.quayio_available }}" = "true" ]; then
                echo "| Quay.io | \`quay.io/pawsey/${IMAGE_NAME}:${VERSION}\` | ❌ Failed |" >> /tmp/registry_block.txt
              else
                echo "| Quay.io | \`quay.io/pawsey/${IMAGE_NAME}:${VERSION}\` | ⏭️ Skipped (No credentials) |" >> /tmp/registry_block.txt
              fi
            else
              echo "| Quay.io | \`quay.io/pawsey/${IMAGE_NAME}:${VERSION}\` | ⏭️ Not in targets |" >> /tmp/registry_block.txt
            fi

            # Quay.io pawseysc (only if in targets)
            if echo "$targets" | jq -e 'contains(["quayio-pawseysc"])' > /dev/null 2>&1; then
              if [ "${{ inputs.quayiosc_available }}" = "true" ] && [ "${{ inputs.result_push_public }}" = "success" ]; then
                echo "| Quay.io (pawseysc) | \`quay.io/pawseysc/${IMAGE_NAME}:${VERSION}\` | ✅ Pushed |" >> /tmp/registry_block.txt
              elif [ "${{ inputs.quayiosc_available }}" = "true" ]; then
                echo "| Quay.io (pawseysc) | \`quay.io/pawseysc/${IMAGE_NAME}:${VERSION}\` | ❌ Failed |" >> /tmp/registry_block.txt
              else
                echo "| Quay.io (pawseysc) | \`quay.io/pawseysc/${IMAGE_NAME}:${VERSION}\` | ⏭️ Skipped (No credentials) |" >> /tmp/registry_block.txt
              fi
            else
              echo "| Quay.io (pawseysc) | \`quay.io/pawseysc/${IMAGE_NAME}:${VERSION}\` | ⏭️ Not in targets |" >> /tmp/registry_block.txt
            fi

            # Setonix Public Registry (only if in targets)
            if echo "$targets" | jq -e 'contains(["setonix-registry"])' > /dev/null 2>&1; then
              if [ "${{ inputs.setonixreg_available }}" = "true" ] && [ "${{ inputs.result_push_public }}" = "success" ]; then
                echo "| Setonix Public | \`setonix-registry.pawsey.org.au/pawsey/${IMAGE_NAME}:${VERSION}\` | ✅ Pushed |" >> /tmp/registry_block.txt
              elif [ "${{ inputs.setonixreg_available }}" = "true" ]; then
                echo "| Setonix Public | \`setonix-registry.pawsey.org.au/pawsey/${IMAGE_NAME}:${VERSION}\` | ❌ Failed |" >> /tmp/registry_block.txt
              else
                echo "| Setonix Public | \`setonix-registry.pawsey.org.au/pawsey/${IMAGE_NAME}:${VERSION}\` | ⏭️ Skipped (No credentials) |" >> /tmp/registry_block.txt
              fi
            else
              echo "| Setonix Public | \`setonix-registry.pawsey.org.au/pawsey/${IMAGE_NAME}:${VERSION}\` | ⏭️ Not in targets |" >> /tmp/registry_block.txt
            fi
          fi

      - name: Generate SHPC block
        id: shpc_block
        run: |
          IMAGE_NAME="${MAIN}-${FEATURE}"

          # SHPC deployment status
          if [ "${{ inputs.result_deploy }}" = "success" ]; then
            # Use Quay.io for SHPC deployment
            targets='${{ inputs.targets }}'
            if echo "$targets" | jq -e 'contains(["quay.io"])' > /dev/null 2>&1 && [ "${{ inputs.quayio_available }}" = "true" ]; then
              if [ "${{ env.HAS_TEMPLATE }}" = "true" ]; then
                cat > /tmp/shpc_block.txt <<EOF
          > **Note:** Each of the ${{ env.VARIANT_COUNT }} variant(s) has been deployed to SHPC registry.

          **SHPC Registry Path:** \`/software/setonix/2025.08/pawsey/software/shpc/pawsey_registry/quay.io/pawsey/${IMAGE_NAME}/\`

          **Available Variants:**
          EOF
                matrix_json='${{ inputs.build_matrix }}'
                while read -r vimg; do
                  echo "- \`quay.io/pawsey/${vimg}:${VERSION}\`" >> /tmp/shpc_block.txt
                done < <(echo "$matrix_json" | jq -r '.include[].image_name')
                echo "" >> /tmp/shpc_block.txt
                echo "### SHPC Usage Commands" >> /tmp/shpc_block.txt
                echo "" >> /tmp/shpc_block.txt
                echo "Load and use a specific variant via SHPC:" >> /tmp/shpc_block.txt
                echo "\`\`\`bash" >> /tmp/shpc_block.txt
                echo "# Load SHPC module" >> /tmp/shpc_block.txt
                echo "module load shpc/0.1.32" >> /tmp/shpc_block.txt
                echo "" >> /tmp/shpc_block.txt
                echo "# List available variants" >> /tmp/shpc_block.txt
                first_variant_name=$(echo "$matrix_json" | jq -r '.include[0].image_name')
                echo "shpc show quay.io/pawsey/${first_variant_name}" >> /tmp/shpc_block.txt
                echo "" >> /tmp/shpc_block.txt
                echo "# Install a specific variant (example with first variant)" >> /tmp/shpc_block.txt
                echo "shpc install quay.io/pawsey/${first_variant_name}:${VERSION}" >> /tmp/shpc_block.txt
                echo "" >> /tmp/shpc_block.txt
                echo "# Use the container" >> /tmp/shpc_block.txt
                echo "shpc run quay.io/pawsey/${first_variant_name}:${VERSION} <command>" >> /tmp/shpc_block.txt
                echo "\`\`\`" >> /tmp/shpc_block.txt
              else
                shpc_image="quay.io/pawsey/${IMAGE_NAME}:${VERSION}"
                cat > /tmp/shpc_block.txt <<EOF
          | Registry Path | Image Source | Status |
          |---------------|--------------|--------|
          | \`/software/setonix/2025.08/pawsey/software/shpc/pawsey_registry/quay.io/pawsey/${IMAGE_NAME}/\` | \`$shpc_image\` | ✅ Deployed |

          ### SHPC Usage Commands

          Load and use the container via SHPC:
          \`\`\`bash
          # Load SHPC module
          module load shpc/0.1.32

          # Install the container
          shpc install $shpc_image

          # Show available commands
          shpc show $shpc_image

          # Use the container
          shpc run $shpc_image <command>
          \`\`\`
          EOF
              fi
            fi
          elif [ "${{ inputs.result_deploy }}" = "failure" ]; then
            echo "| SHPC Registry | N/A | ❌ Deployment Failed |" > /tmp/shpc_block.txt
          elif [ "${{ inputs.result_deploy }}" = "skipped" ]; then
            echo "| SHPC Registry | N/A | ⏭️ Skipped (shpc=false or Quay.io not available or platform=arm) |" > /tmp/shpc_block.txt
          else
            echo "| SHPC Registry | N/A | ⏸️ Not Executed |" > /tmp/shpc_block.txt
          fi

      - name: Generate job results block
        id: job_results_block
        run: |
          cat > /tmp/job_results_block.txt <<EOF
          | Job | Status |
          |-----|--------|
          | PREPARE | ${{ inputs.result_prepare == 'success' && '✅ Success' || '❌ Failed' }} |
          | BUILD | ${{ inputs.result_build == 'success' && '✅ Success' || '❌ Failed' }} |
          | SCAN-AND-REPORT | ${{ inputs.result_scan == 'success' && '✅ Success' || (inputs.result_scan == 'skipped' && '⏭️ Skipped (scan=false)') || '❌ Failed' }} |
          | TEST | ${{ inputs.result_test == 'success' && '✅ Ran (see Tests section)' || (inputs.result_test == 'skipped' && '⏭️ Skipped (no tests)') || '❌ Failed' }} |
          | PUSH-PRIV | ${{ inputs.result_push_priv == 'success' && '✅ Success' || (inputs.result_push_priv == 'skipped' && '⏭️ Skipped') || '❌ Failed' }} |
          | PUSH-PUBLIC | ${{ inputs.result_push_public == 'success' && '✅ Success' || (inputs.result_push_public == 'skipped' && '⏭️ Skipped (no public target selected)') || '❌ Failed' }} |
          | DEPLOY | ${{ inputs.result_deploy == 'success' && '✅ Success' || (inputs.result_deploy == 'skipped' && '⏭️ Skipped') || '❌ Failed' }} |
          EOF

      # Pull the per-variant test-results-* artifacts (each carries a
      # test-result-N.json with status/exit_code/log_tail) so the markdown
      # block below and the summary.json further down can render test outcomes.
      - name: Download test results
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          path: /tmp/test-artifacts

      - name: Generate tests block
        id: tests_block
        run: |
          set -uo pipefail
          OUT=/tmp/tests_block.txt
          RESULT_TEST="${{ inputs.result_test }}"

          if [ "$RESULT_TEST" = "skipped" ] || [ -z "$RESULT_TEST" ]; then
            echo "> ℹ️ No tests were provided for this image. Upload an \`entrypoint-tests.sh\` (or a test archive) in the web UI to have the pipeline run it inside each built image." > "$OUT"
          elif ls /tmp/test-artifacts/*/test-result-*.json >/dev/null 2>&1; then
            passed=0; failed=0
            echo "| Variant | Result | Exit code |" > "$OUT"
            echo "|---------|--------|-----------|" >> "$OUT"
            for f in /tmp/test-artifacts/*/test-result-*.json; do
              img=$(jq -r '.image_name' "$f")
              st=$(jq -r '.status' "$f")
              code=$(jq -r '.exit_code' "$f")
              if [ "$st" = "passed" ]; then icon="✅ passed"; passed=$((passed+1)); else icon="❌ failed"; failed=$((failed+1)); fi
              echo "| \`$img\` | $icon | $code |" >> "$OUT"
            done
            echo "" >> "$OUT"
            echo "**${passed} passed, ${failed} failed** — tests are advisory (report-only) and do not block publishing." >> "$OUT"
            echo "" >> "$OUT"
            for f in /tmp/test-artifacts/*/test-result-*.json; do
              img=$(jq -r '.image_name' "$f")
              st=$(jq -r '.status' "$f")
              echo "<details><summary>🧪 ${img} — ${st} — entrypoint-tests.sh output</summary>" >> "$OUT"
              echo "" >> "$OUT"
              echo '```' >> "$OUT"
              jq -r '.log_tail // ""' "$f" >> "$OUT"
              echo '```' >> "$OUT"
              echo "" >> "$OUT"
              echo "</details>" >> "$OUT"
              echo "" >> "$OUT"
            done
          else
            echo "> ⚠️ The test stage ran (result: \`${RESULT_TEST}\`) but no result artifacts were found." > "$OUT"
          fi

      - name: Render summary from template
        run: |
          IMAGE_NAME="${MAIN}-${FEATURE}"
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')
          BRANCH="${{ github.ref_name }}"

          # Create environment for envsubst
          export IMAGE_NAME VERSION MAIN FEATURE PLATFORM CORRELATION_ID BRANCH TIMESTAMP

          # First pass: substitute simple scalar values
          cat .github/templates/summary_template.md | \
            sed "s|__IMAGE_NAME__|${IMAGE_NAME}|g" | \
            sed "s|__VERSION__|${VERSION}|g" | \
            sed "s|__MAIN__|${MAIN}|g" | \
            sed "s|__FEATURE__|${FEATURE}|g" | \
            sed "s|__PLATFORM__|${PLATFORM}|g" | \
            sed "s|__CORRELATION_ID__|${CORRELATION_ID}|g" | \
            sed "s|__BRANCH__|${BRANCH}|g" | \
            sed "s|__TIMESTAMP__|${TIMESTAMP}|g" > /tmp/summary_step1.md

          # Second pass: insert multi-line blocks
          sed -e '/__VARIANT_BLOCK__/{
            r /tmp/variant_block.txt
            d
          }' /tmp/summary_step1.md > /tmp/summary_step2.md

          sed -e '/__ARCHIVE_BLOCK__/{
            r /tmp/archive_block.txt
            d
          }' /tmp/summary_step2.md > /tmp/summary_step3.md

          sed -e '/__REGISTRY_BLOCK__/{
            r /tmp/registry_block.txt
            d
          }' /tmp/summary_step3.md > /tmp/summary_step4.md

          sed -e '/__SHPC_BLOCK__/{
            r /tmp/shpc_block.txt
            d
          }' /tmp/summary_step4.md > /tmp/summary_step5.md

          sed -e '/__TESTS_BLOCK__/{
            r /tmp/tests_block.txt
            d
          }' /tmp/summary_step5.md > /tmp/summary_step6.md

          sed -e '/__JOB_RESULTS_BLOCK__/{
            r /tmp/job_results_block.txt
            d
          }' /tmp/summary_step6.md > /tmp/summary_final.md

          # Append final rendered summary to workflow summary
          cat /tmp/summary_final.md >> $GITHUB_STEP_SUMMARY

          echo "✅ Summary rendered and published"

      # Pull the per-variant trivy-reports-* artifacts (each carries a
      # scan-counts.json) so the summary.json below can aggregate vuln counts.
      # Best-effort: no artifacts when scan was skipped -> continue.
      - name: Download scan reports
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: trivy-reports-*
          path: /tmp/scan-artifacts

      # ---- Machine-readable summary for the ImageManagerWeb frontend --------
      # The rendered $GITHUB_STEP_SUMMARY above is NOT available via the REST API,
      # so we also emit a structured summary.json artifact that the web backend
      # downloads and parses (exact S3 URIs + per-registry image refs + results).
      - name: Generate machine-readable summary.json
        if: always()
        env:
          TARGETS: ${{ inputs.targets }}
          PRIVATE_TARGETS: ${{ inputs.private_targets }}
          BUILD_MATRIX: ${{ inputs.build_matrix }}
          ACACIA_BUCKET: ${{ inputs.acacia_bucket }}
          ACACIA_SIF_BUCKET: ${{ inputs.acacia_sif_bucket }}
          QUAYIO_AVAILABLE: ${{ inputs.quayio_available }}
          QUAYIOSC_AVAILABLE: ${{ inputs.quayiosc_available }}
          SETONIXREG_AVAILABLE: ${{ inputs.setonixreg_available }}
          RESULT_PREPARE: ${{ inputs.result_prepare }}
          RESULT_BUILD: ${{ inputs.result_build }}
          RESULT_SCAN: ${{ inputs.result_scan }}
          RESULT_TEST: ${{ inputs.result_test }}
          RESULT_PUSH_PRIV: ${{ inputs.result_push_priv }}
          RESULT_PUSH_PUBLIC: ${{ inputs.result_push_public }}
          RESULT_DEPLOY: ${{ inputs.result_deploy }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          IMAGE_NAME="${MAIN}-${FEATURE}"
          TS=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          # Sanitize JSON-typed inputs (fall back to safe defaults if malformed).
          echo "$TARGETS"         | jq . >/dev/null 2>&1 || TARGETS='[]'
          echo "$PRIVATE_TARGETS" | jq . >/dev/null 2>&1 || PRIVATE_TARGETS='[]'
          echo "$BUILD_MATRIX"    | jq . >/dev/null 2>&1 || BUILD_MATRIX='{"include":[]}'
          PRIVATE_USER=$(echo "$PRIVATE_TARGETS" | jq -r '.[0] // "unknown"')

          # The list of image names: from the matrix for multi-variant, else MAIN-FEATURE.
          if [ "$HAS_TEMPLATE" = "true" ]; then
            # // empty drops missing/null image_name entries so the fallback below fires
            IMAGE_NAMES=$(echo "$BUILD_MATRIX" | jq -r '.include[].image_name // empty' 2>/dev/null)
          fi
          if [ -z "${IMAGE_NAMES:-}" ]; then IMAGE_NAMES="$IMAGE_NAME"; fi

          # Per-registry result (mirrors the markdown registry block logic).
          quay_in=no;  echo "$TARGETS" | jq -e 'contains(["quay.io"])'         >/dev/null 2>&1 && quay_in=yes
          quaysc_in=no; echo "$TARGETS" | jq -e 'contains(["quayio-pawseysc"])' >/dev/null 2>&1 && quaysc_in=yes
          setpub_in=no; echo "$TARGETS" | jq -e 'contains(["setonix-registry"])' >/dev/null 2>&1 && setpub_in=yes

          priv_result="skipped"
          if [ "$RESULT_PUSH_PRIV" = "skipped" ]; then priv_result="skipped"
          elif [ "$SETONIXREG_AVAILABLE" = "true" ] && [ "$RESULT_PUSH_PRIV" = "success" ]; then priv_result="success"
          elif [ "$SETONIXREG_AVAILABLE" = "true" ]; then priv_result="failed"; fi

          quay_result="not_in_targets"
          if [ "$quay_in" = "yes" ]; then
            if [ "$QUAYIO_AVAILABLE" = "true" ] && [ "$RESULT_PUSH_PUBLIC" = "success" ]; then quay_result="success"
            elif [ "$QUAYIO_AVAILABLE" = "true" ]; then quay_result="failed"; else quay_result="skipped"; fi
          fi

          quaysc_result="not_in_targets"
          if [ "$quaysc_in" = "yes" ]; then
            if [ "$QUAYIOSC_AVAILABLE" = "true" ] && [ "$RESULT_PUSH_PUBLIC" = "success" ]; then quaysc_result="success"
            elif [ "$QUAYIOSC_AVAILABLE" = "true" ]; then quaysc_result="failed"; else quaysc_result="skipped"; fi
          fi

          setpub_result="not_in_targets"
          if [ "$setpub_in" = "yes" ]; then
            if [ "$SETONIXREG_AVAILABLE" = "true" ] && [ "$RESULT_PUSH_PUBLIC" = "success" ]; then setpub_result="success"
            elif [ "$SETONIXREG_AVAILABLE" = "true" ]; then setpub_result="failed"; else setpub_result="skipped"; fi
          fi

          variants='[]'
          while read -r img; do
            [ -z "$img" ] && continue
            v=$(jq -n \
              --arg img "$img" --arg ver "$VERSION" \
              --arg dbucket "$ACACIA_BUCKET" --arg sbucket "$ACACIA_SIF_BUCKET" \
              --arg puser "$PRIVATE_USER" \
              --arg rb "$RESULT_BUILD" \
              --arg priv "$priv_result" --arg quay "$quay_result" --arg quaysc "$quaysc_result" --arg setpub "$setpub_result" \
              '{
                image_name: $img,
                archives: {
                  tar: ("s3://" + $dbucket + "/" + $img + "_" + $ver + ".tar"),
                  sif: ("s3://" + $sbucket + "/" + $img + "_" + $ver + ".sif"),
                  uploaded: ($rb == "success")
                },
                images: [
                  {registry:"Setonix (private)", ref:("setonix-registry.pawsey.org.au/" + $puser + "/" + $img + ":" + $ver), result:$priv},
                  {registry:"Quay.io",           ref:("quay.io/pawsey/" + $img + ":" + $ver),                                result:$quay},
                  {registry:"Quay.io (pawseysc)",ref:("quay.io/pawseysc/" + $img + ":" + $ver),                              result:$quaysc},
                  {registry:"Setonix (public)",  ref:("setonix-registry.pawsey.org.au/pawsey/" + $img + ":" + $ver),         result:$setpub}
                ]
              }')
            variants=$(echo "$variants" | jq --argjson v "$v" '. + [$v]')
          done <<< "$IMAGE_NAMES"

          # Aggregate Trivy vuln counts across the per-variant scan-counts.json
          # files pulled by the Download scan reports step (null if scan skipped).
          SCAN_JSON=null
          if ls /tmp/scan-artifacts/*/scan-counts.json >/dev/null 2>&1; then
            SCAN_JSON=$(jq -s '{
              available: true,
              scanned_variants: length,
              critical: (map(.counts.CRITICAL // 0) | add),
              high:     (map(.counts.HIGH // 0)     | add),
              medium:   (map(.counts.MEDIUM // 0)   | add),
              low:      (map(.counts.LOW // 0)      | add),
              unknown:  (map(.counts.UNKNOWN // 0)  | add),
              total:    (map(.total // 0)           | add)
            }' /tmp/scan-artifacts/*/scan-counts.json 2>/dev/null || echo null)
          fi

          # Aggregate per-variant test results (downloaded above). null if the
          # TEST stage was skipped (no test bundle) or produced no artifacts.
          TESTS_JSON=null
          if ls /tmp/test-artifacts/*/test-result-*.json >/dev/null 2>&1; then
            TESTS_JSON=$(jq -s '{
              available: true,
              tested_variants: length,
              passed: (map(select(.status == "passed")) | length),
              failed: (map(select(.status == "failed")) | length),
              results: map({image_name, exit_code, status, log_tail})
            }' /tmp/test-artifacts/*/test-result-*.json 2>/dev/null || echo null)
          fi

          jq -n \
            --arg main "$MAIN" --arg feature "$FEATURE" --arg version "$VERSION" \
            --arg platform "$PLATFORM" --arg branch "$BRANCH" \
            --arg corr "$CORRELATION_ID" --arg ts "$TS" --arg runid "$RUN_ID" \
            --arg has_template "$HAS_TEMPLATE" --arg vcount "$VARIANT_COUNT" \
            --argjson targets "$TARGETS" \
            --arg dbucket "$ACACIA_BUCKET" --arg sbucket "$ACACIA_SIF_BUCKET" \
            --arg quay_avail "$QUAYIO_AVAILABLE" --arg setonix_avail "$SETONIXREG_AVAILABLE" \
            --arg rp "$RESULT_PREPARE" --arg rb "$RESULT_BUILD" --arg rs "$RESULT_SCAN" \
            --arg rt "$RESULT_TEST" \
            --arg rpp "$RESULT_PUSH_PRIV" --arg rpub "$RESULT_PUSH_PUBLIC" --arg rd "$RESULT_DEPLOY" \
            --argjson variants "$variants" \
            --argjson scan "$SCAN_JSON" \
            --argjson tests "$TESTS_JSON" \
            '{
              schema: 1,
              main: $main, feature: $feature, version: $version, platform: $platform,
              branch: $branch, correlation_id: $corr, run_id: $runid, generated_at: $ts,
              has_template: ($has_template == "true"),
              variant_count: ($vcount | tonumber? // 0),
              targets: $targets,
              registries_available: {quayio: ($quay_avail == "true"), setonix: ($setonix_avail == "true")},
              buckets: {docker: $dbucket, sif: $sbucket},
              results: {prepare:$rp, build:$rb, scan:$rs, test:$rt, push_priv:$rpp, push_public:$rpub, deploy:$rd},
              scan: $scan,
              tests: $tests,
              variants: $variants
            }' > summary.json

          echo "--- summary.json ---"; cat summary.json

      - name: Upload summary.json artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: image-manager-summary
          path: summary.json
          retention-days: 30
          if-no-files-found: warn
