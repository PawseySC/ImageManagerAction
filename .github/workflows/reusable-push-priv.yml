name: Reusable — PUSH PRIVATE

on:
  workflow_call:
    inputs:
      runner_label:
        required: true
        type: string
      main:
        required: true
        type: string
      feature:
        required: true
        type: string
      version:
        required: true
        type: string
      has_template:
        required: true
        type: string
      build_matrix:
        required: true
        type: string
      private_targets:
        required: true
        type: string
      setonixreg_available:
        required: true
        type: string
    secrets:
      ACACIA_ACCESS_KEY_ID:
        required: true
      ACACIA_SECRET_ACCESS_KEY:
        required: true
      SETONIXREG_PASS:
        required: false

jobs:
  push_private:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(inputs.build_matrix) }}
      fail-fast: false
    env:
      VERSION: ${{ inputs.version }}
      BUCKET: ${{ vars.ACACIA_BUCKETNAME }}
    steps:
    - name: Set image name for this variant
      id: set_image_name
      run: |
        set -euo pipefail

        # Use pre-computed IMAGE_NAME from matrix (already sanitized)
        IMAGE_NAME='${{ matrix.image_name }}'

        echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
        echo "Image name: $IMAGE_NAME"

    - name: Display registry environment
      run: |
        echo "Hostname: $(hostname)"
        echo "Pushing: ${IMAGE_NAME}:${VERSION}"
        echo "Variant #${{ matrix.index }}"

    - name: Configure podman environment
      run: |
        echo "Setting up container environment variables for push..."

        # Export environment variables (same as BUILD-job)
        export XDG_DATA_HOME=/container/${USER}/data
        export XDG_RUNTIME_DIR=/container/${USER}/runtime
        export TMPDIR=/container/${USER}/tmp/

        # Create required directories
        mkdir -p ${XDG_DATA_HOME}
        mkdir -p ${XDG_RUNTIME_DIR}
        mkdir -p ${TMPDIR}

        echo "Push environment setup completed:"
        echo "XDG_DATA_HOME: ${XDG_DATA_HOME}"
        echo "XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}"
        echo "TMPDIR: ${TMPDIR}"

        # Set environment variables for subsequent steps
        echo "XDG_DATA_HOME=${XDG_DATA_HOME}" >> $GITHUB_ENV
        echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}" >> $GITHUB_ENV
        echo "TMPDIR=${TMPDIR}" >> $GITHUB_ENV

    - name: Download archive from S3
      id: locate_archive
      uses: ./.github/actions/setup-rclone
      with:
        access_key_id: ${{ secrets.ACACIA_ACCESS_KEY_ID }}
        secret_access_key: ${{ secrets.ACACIA_SECRET_ACCESS_KEY }}
        endpoint: https://projects.pawsey.org.au
        bucket: ${{ env.BUCKET }}
        destination_path: ${{ env.IMAGE_NAME }}_${{ env.VERSION }}.tar
        download_mode: true
        dockerfile_name: ${{ env.IMAGE_NAME }}
        version: ${{ env.VERSION }}
        load_to_podman: false

    - name: Push to Setonix private registry
      if: inputs.setonixreg_available == 'true'
      run: |
        set -euo pipefail
        echo "=========================================="
        echo " Setonix Registry Push Process"
        echo "=========================================="

        # Retry helper: $1=attempts, $2=delay_seconds, rest=command
        retry() {
          local attempts="$1"; local delay="$2"; shift 2
          local n=1
          until "$@"; do
            if [ "$n" -ge "$attempts" ]; then
              echo "✗ Command failed after $n attempts: $*"
              return 1
            fi
            echo "↻ Attempt $n failed; retrying in ${delay}s…"
            sleep "$delay"
            n=$((n+1))
            delay=$((delay*2))
          done
        }

        echo "📦 Loading image from archive..."
        archive_file="${{ steps.locate_archive.outputs.archive_name }}"
        podman load -i "$archive_file" || { echo "✗ Failed to load image from archive"; exit 1; }
        echo "✓ Image loaded"

        echo "🔐 Logging into Setonix Registry..."
        retry 3 5 podman login https://setonix-registry.pawsey.org.au \
          -u "${{ vars.SETONIXREG_USERNAME }}" -p "${{ secrets.SETONIXREG_PASS }}" \
          || { echo "✗ Setonix Registry login failed"; exit 1; }

        private_targets='${{ inputs.private_targets }}'
        private_username=$(echo "$private_targets" | jq -r '.[0] // empty')
        if [ -z "$private_username" ] || [ "$private_username" = "null" ]; then
          echo "Error: No private targets found in manifest"; exit 1
        fi

        image_tag="${IMAGE_NAME}:${VERSION}"
        setonix_tag="setonix-registry.pawsey.org.au/${private_username}/${IMAGE_NAME}:${VERSION}"
        echo "🏷️  Tagging $image_tag → $setonix_tag"
        podman tag "$image_tag" "$setonix_tag" || { echo "✗ Image tagging failed"; exit 1; }

        echo "📤 Pushing to Setonix Registry (with retry on transient failure)…"
        # 4 attempts, exponential backoff 10s/20s/40s. Covers brief network blips
        # and registry-side throttles without papering over real failures.
        retry 4 10 podman push "$setonix_tag" \
          || { echo "❌ Failed to push to Setonix Registry"; exit 1; }
        echo "✅ Pushed: $setonix_tag"

        # Cleanup local tagged image
        echo ""
        echo "🧹 Cleaning up local Setonix tagged image..."
        podman rmi "$setonix_tag" 2>/dev/null || echo "  (Setonix tag already removed or not found)"
        podman rmi "$image_tag" 2>/dev/null || echo "  (Base image already removed or not found)"
