name: Image Manager CI/CD Dispatcher
# Version 2.1.0 - Modularized with reusable workflows
# This workflow dispatches to reusable workflow files for easier debugging
# Triggered by pushes to cicd-* branches with manifest.json configuration
# Branch format: cicd-<main>/<feature> (the dash form cicd-main-feature is NOT supported)

on:
  push:
    branches:
      - 'cicd-*'
      - 'cicd-*/**'

# Serialize runs per cicd branch. A second push for the same main/feature
# cancels the in-flight one rather than racing on the registry / runner cache.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read           # Required for accessing workflow run information

jobs:
  PREPARE:
    uses: ./.github/workflows/reusable-prepare.yml
    secrets: inherit

  BUILD:
    needs: PREPARE
    if: needs.PREPARE.outputs.proceed_valid == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      runner_label: ${{ needs.PREPARE.outputs.runner_label }}
      branch_path: ${{ needs.PREPARE.outputs.branch_path }}
      dockerfile_path: ${{ needs.PREPARE.outputs.dockerfile_path }}
      main: ${{ needs.PREPARE.outputs.main }}
      feature: ${{ needs.PREPARE.outputs.feature }}
      version: ${{ needs.PREPARE.outputs.version }}
      platform: ${{ needs.PREPARE.outputs.platform }}
      correlation_id: ${{ needs.PREPARE.outputs.correlation_id }}
      has_template: ${{ needs.PREPARE.outputs.has_template }}
      build_matrix: ${{ needs.PREPARE.outputs.build_matrix }}
    secrets: inherit

  SCAN:
    needs: [PREPARE, BUILD]
    if: needs.PREPARE.outputs.proceed_valid == 'true' && needs.PREPARE.outputs.scan == 'true'
    uses: ./.github/workflows/reusable-scan.yml
    with:
      runner_label: ${{ needs.PREPARE.outputs.runner_label }}
      main: ${{ needs.PREPARE.outputs.main }}
      feature: ${{ needs.PREPARE.outputs.feature }}
      version: ${{ needs.PREPARE.outputs.version }}
      has_template: ${{ needs.PREPARE.outputs.has_template }}
      build_matrix: ${{ needs.PREPARE.outputs.build_matrix }}
      correlation_id: ${{ needs.PREPARE.outputs.correlation_id }}
    secrets: inherit

  TEST:
    needs: [PREPARE, BUILD]
    # Report-only: runs the user's entrypoint-tests.sh inside each built image.
    # Only scheduled when a test bundle was committed (PREPARE.has_tests). Never
    # gates PUSH/DEPLOY — its result is surfaced in the summary only.
    if: needs.PREPARE.outputs.proceed_valid == 'true' && needs.PREPARE.outputs.has_tests == 'true'
    uses: ./.github/workflows/reusable-test.yml
    with:
      runner_label: ${{ needs.PREPARE.outputs.runner_label }}
      main: ${{ needs.PREPARE.outputs.main }}
      feature: ${{ needs.PREPARE.outputs.feature }}
      version: ${{ needs.PREPARE.outputs.version }}
      has_template: ${{ needs.PREPARE.outputs.has_template }}
      build_matrix: ${{ needs.PREPARE.outputs.build_matrix }}
      correlation_id: ${{ needs.PREPARE.outputs.correlation_id }}
      branch_path: ${{ needs.PREPARE.outputs.branch_path }}
    secrets: inherit

  PUSH_PRIV:
    needs: [PREPARE, BUILD]
    # Skip entirely when the manifest names no private target — an empty list is
    # a valid configuration (public-only build), not an error.
    if: |
      needs.PREPARE.outputs.proceed_valid == 'true' &&
      needs.PREPARE.outputs.private_targets != '[]' &&
      needs.PREPARE.outputs.private_targets != ''
    uses: ./.github/workflows/reusable-push-priv.yml
    with:
      runner_label: ${{ needs.PREPARE.outputs.runner_label }}
      main: ${{ needs.PREPARE.outputs.main }}
      feature: ${{ needs.PREPARE.outputs.feature }}
      version: ${{ needs.PREPARE.outputs.version }}
      has_template: ${{ needs.PREPARE.outputs.has_template }}
      build_matrix: ${{ needs.PREPARE.outputs.build_matrix }}
      private_targets: ${{ needs.PREPARE.outputs.private_targets }}
      setonixreg_available: ${{ needs.PREPARE.outputs.setonixreg_available }}
    secrets: inherit

  PUSH_PUBLIC:
    needs: [PREPARE, BUILD, PUSH_PRIV]
    # Only schedule this job — and therefore only trigger the manual_approval
    # environment gate — when a PUBLIC registry is actually selected AND its
    # credentials are available. The environment approval is requested before any
    # step runs, so without this gate an empty `targets` (devmode / private-only
    # builds) would block on approval even though every inner push step would skip.
    # Mirror the step-level conditions in reusable-push-public.yml exactly.
    # PUSH_PRIV may be legitimately SKIPPED (no private target in the manifest).
    # A skipped need cascade-skips dependents via the implicit success(), so we
    # override with !cancelled() and re-state what we actually require: BUILD
    # succeeded and PUSH_PRIV did not fail (success or skipped). PUSH_PRIV
    # failure still blocks the public push (and the approval request).
    if: |
      !cancelled() &&
      needs.BUILD.result == 'success' &&
      (needs.PUSH_PRIV.result == 'success' || needs.PUSH_PRIV.result == 'skipped') &&
      needs.PREPARE.outputs.proceed_valid == 'true' &&
      (
        (contains(needs.PREPARE.outputs.targets, 'quay.io') && needs.PREPARE.outputs.quayio_available == 'true') ||
        (contains(needs.PREPARE.outputs.targets, 'quayio-pawseysc') && needs.PREPARE.outputs.quayiosc_available == 'true') ||
        (contains(needs.PREPARE.outputs.targets, 'setonix-registry') && needs.PREPARE.outputs.setonixreg_available == 'true')
      )
    uses: ./.github/workflows/reusable-push-public.yml
    with:
      runner_label: ${{ needs.PREPARE.outputs.runner_label }}
      main: ${{ needs.PREPARE.outputs.main }}
      feature: ${{ needs.PREPARE.outputs.feature }}
      version: ${{ needs.PREPARE.outputs.version }}
      has_template: ${{ needs.PREPARE.outputs.has_template }}
      build_matrix: ${{ needs.PREPARE.outputs.build_matrix }}
      targets: ${{ needs.PREPARE.outputs.targets }}
      devmode: ${{ needs.PREPARE.outputs.devmode }}
      quayio_available: ${{ needs.PREPARE.outputs.quayio_available }}
      quayiosc_available: ${{ needs.PREPARE.outputs.quayiosc_available }}
      setonixreg_available: ${{ needs.PREPARE.outputs.setonixreg_available }}
    secrets: inherit

  DEPLOY:
    needs: [PREPARE, BUILD, PUSH_PUBLIC]
    if: |
      needs.PREPARE.outputs.proceed_valid == 'true' &&
      needs.PREPARE.outputs.shpc == 'true' &&
      needs.PREPARE.outputs.platform == 'x86' &&
      needs.PREPARE.outputs.quayio_available == 'true' &&
      contains(needs.PREPARE.outputs.targets, 'quay.io')
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      runner_label: ${{ needs.PREPARE.outputs.runner_label }}
      version: ${{ needs.PREPARE.outputs.version }}
      main: ${{ needs.PREPARE.outputs.main }}
      feature: ${{ needs.PREPARE.outputs.feature }}
      platform: ${{ needs.PREPARE.outputs.platform }}
      correlation_id: ${{ needs.PREPARE.outputs.correlation_id }}
      has_template: ${{ needs.PREPARE.outputs.has_template }}
      build_matrix: ${{ needs.PREPARE.outputs.build_matrix }}
      targets: ${{ needs.PREPARE.outputs.targets }}
      quayio_available: ${{ needs.PREPARE.outputs.quayio_available }}
    secrets: inherit

  MERGE_TO_MAIN:
    # Promote the cicd branch to main automatically once the run has ACTUALLY
    # succeeded — removes the manual merge step. For public-target runs this only
    # fires AFTER the manual_approval gate (it needs PUSH_PUBLIC, which waits for
    # approval); for private-only / devmode runs PUSH_PUBLIC is skipped and it
    # merges as soon as build + private push succeed. Uses the server-side merges
    # API (atomic, no checkout/push race). main is the default, unprotected branch.
    # Also needs SUMMARY so the branch is deleted only AFTER SUMMARY's checkout — a
    # parallel job fetching a commit on a just-deleted branch can fail. SUMMARY's
    # result is not gated on (it's always() / cosmetic); we just wait for it.
    # SCAN and TEST are advisory by design (report-only) — their results are shown
    # in SUMMARY but never gate the merge.
    needs: [PREPARE, BUILD, PUSH_PRIV, PUSH_PUBLIC, DEPLOY, SUMMARY]
    if: |
      !cancelled() &&
      needs.PREPARE.outputs.proceed_valid == 'true' &&
      needs.BUILD.result == 'success' &&
      (needs.PUSH_PRIV.result == 'success' || needs.PUSH_PRIV.result == 'skipped') &&
      (needs.PUSH_PUBLIC.result == 'success' || needs.PUSH_PUBLIC.result == 'skipped') &&
      (needs.DEPLOY.result == 'success' || needs.DEPLOY.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Merge branch into main and delete it
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Promoting ${BRANCH} -> main via the GitHub merges API…"
          body=$(jq -nc --arg base main --arg head "$BRANCH" \
            --arg msg "ci: merge ${BRANCH} into main (run ${{ github.run_id }})" \
            '{base:$base, head:$head, commit_message:$msg}')
          code=$(curl -sS -o /tmp/merge.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/merges" \
            -d "$body")
          echo "HTTP ${code}"; cat /tmp/merge.json 2>/dev/null || true; echo
          {
            echo "## 🔀 Merge to main"
            case "$code" in
              201) echo "✅ \`${BRANCH}\` merged into \`main\`." ;;
              204) echo "ℹ️ \`main\` already up to date — nothing to merge." ;;
              409) echo "⚠️ Merge conflict — \`main\` not updated. Resolve manually." ;;
              *)   echo "❌ Merge failed (HTTP ${code}). See job log." ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

          # Only on a clean merge (content is safely in main) delete the now-redundant
          # cicd branch. Best-effort: a delete failure is a warning, not a job failure.
          if [ "$code" = "201" ] || [ "$code" = "204" ]; then
            echo "Deleting branch ${BRANCH}…"
            dcode=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/git/refs/heads/${BRANCH}")
            echo "delete HTTP ${dcode}"
            if [ "$dcode" = "204" ]; then
              echo "🧹 Deleted branch \`${BRANCH}\`." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "⚠️ Branch \`${BRANCH}\` not deleted (HTTP ${dcode}) — harmless, it's recreated on next upload." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          case "$code" in 201|204) exit 0 ;; *) exit 1 ;; esac

  SUMMARY:
    needs: [PREPARE, BUILD, SCAN, TEST, PUSH_PRIV, PUSH_PUBLIC, DEPLOY]
    if: always() && needs.PREPARE.outputs.proceed_valid == 'true'
    uses: ./.github/workflows/reusable-summary.yml
    with:
      main: ${{ needs.PREPARE.outputs.main }}
      feature: ${{ needs.PREPARE.outputs.feature }}
      version: ${{ needs.PREPARE.outputs.version }}
      platform: ${{ needs.PREPARE.outputs.platform }}
      correlation_id: ${{ needs.PREPARE.outputs.correlation_id }}
      has_template: ${{ needs.PREPARE.outputs.has_template }}
      variant_count: ${{ needs.PREPARE.outputs.variant_count }}
      build_matrix: ${{ needs.PREPARE.outputs.build_matrix }}
      result_prepare: ${{ needs.PREPARE.result }}
      result_build: ${{ needs.BUILD.result }}
      result_scan: ${{ needs.SCAN.result }}
      result_test: ${{ needs.TEST.result }}
      result_push_priv: ${{ needs.PUSH_PRIV.result }}
      result_push_public: ${{ needs.PUSH_PUBLIC.result }}
      result_deploy: ${{ needs.DEPLOY.result }}
      targets: ${{ needs.PREPARE.outputs.targets }}
      private_targets: ${{ needs.PREPARE.outputs.private_targets }}
      quayio_available: ${{ needs.PREPARE.outputs.quayio_available }}
      quayiosc_available: ${{ needs.PREPARE.outputs.quayiosc_available }}
      setonixreg_available: ${{ needs.PREPARE.outputs.setonixreg_available }}
      acacia_bucket: ${{ vars.ACACIA_BUCKETNAME }}
      acacia_sif_bucket: ${{ vars.ACACIA_SIF_BUCKETNAME }}
    secrets: inherit

  CLEANUP_BRANCH:
    # Delete the cicd branch when the run did NOT end in a merge (build/push
    # failed, public approval rejected, or invalid manifest) so failed runs don't
    # accumulate stale branches. Fires only when MERGE_TO_MAIN was SKIPPED — NOT
    # when it FAILED (merge conflict), where the branch is kept for manual merge.
    # Uses !cancelled() (not always()) so a run that was superseded/cancelled —
    # where a newer run already owns this branch — never deletes it out from under
    # the new run. Needs SUMMARY so deletion happens only after SUMMARY's checkout.
    needs: [SUMMARY, MERGE_TO_MAIN]
    if: |
      !cancelled() && needs.MERGE_TO_MAIN.result == 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete stale cicd branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          echo "Run did not produce a merge — deleting stale branch ${BRANCH}…"
          dcode=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/git/refs/heads/${BRANCH}")
          echo "delete HTTP ${dcode}"
          {
            echo "## 🧹 Branch cleanup"
            if [ "$dcode" = "204" ]; then
              echo "🧹 Run did not produce a merge — deleted stale branch \`${BRANCH}\` (recreated on next upload)."
            elif [ "$dcode" = "422" ]; then
              echo "ℹ️ Branch \`${BRANCH}\` already gone."
            else
              echo "ℹ️ Branch \`${BRANCH}\` not deleted (HTTP ${dcode})."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Best-effort housekeeping — never pile a red job on top of the real failure.
          exit 0
