name: Reusable — PUSH PUBLIC

on:
  workflow_call:
    inputs:
      runner_label:
        required: true
        type: string
      main:
        required: true
        type: string
      feature:
        required: true
        type: string
      version:
        required: true
        type: string
      has_template:
        required: true
        type: string
      build_matrix:
        required: true
        type: string
      targets:
        required: true
        type: string
      devmode:
        required: true
        type: string
      quayio_available:
        required: true
        type: string
      quayiosc_available:
        required: false
        default: 'false'
        type: string
      setonixreg_available:
        required: true
        type: string
    secrets:
      ACACIA_ACCESS_KEY_ID:
        required: true
      ACACIA_SECRET_ACCESS_KEY:
        required: true
      QUAYIO_TOKEN:
        required: false
      QUAYIO_SC_TOKEN:
        required: false
      SETONIXREG_PASS:
        required: false

jobs:
  push_public:
    runs-on: ${{ fromJSON(inputs.runner_label) }}
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(inputs.build_matrix) }}
      fail-fast: false
    # Public-registry pushes require the `manual_approval` environment, EXCEPT
    # when devmode is set — then the job routes to the unprotected `development`
    # environment so dev/test builds proceed without a human gate.
    #
    # NOTE: devmode comes from the uploaded manifest, so anyone who can upload
    # (the web UI sits behind Cloudflare Access) can skip public-push review by
    # enabling dev mode. This is an intentional owner decision. If uploads ever
    # become untrusted, bind the fast lane to a server-only signal (a
    # deploy-key-only tag, an admin-set label, etc.) instead of the manifest.
    environment:
      name: ${{ inputs.devmode == 'true' && 'development' || 'manual_approval' }}
    env:
      VERSION: ${{ inputs.version }}
      TARGETS: ${{ inputs.targets }}
    steps:
    # Local composite actions (./.github/actions/…) resolve against the job's
    # OWN checkout — never rely on a previous job's leftover workspace, which on
    # self-hosted runners can hold a DIFFERENT branch's version of the action.
    - name: Checkout (required to resolve local composite actions)
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Set image name for this variant
      id: set_image_name
      run: |
        set -euo pipefail

        # Use pre-computed IMAGE_NAME from matrix (already sanitized)
        IMAGE_NAME='${{ matrix.image_name }}'

        echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
        echo "Image name: $IMAGE_NAME"

    - name: Display public registry push plan
      run: |
        echo "Hostname: $(hostname)"
        echo "Image: ${IMAGE_NAME}:${VERSION}"
        echo "Variant #${{ matrix.index }}"
        echo "Configured Targets: $TARGETS"
        echo ""
        echo "=== Public Registry Push Plan ==="
        echo "Registry credentials were checked in PREPARE-job:"
        echo ""

        # Parse targets from manifest
        targets_array=$(echo '${{ inputs.targets }}' | jq -r '.[]')

        # Check each target from manifest against available credentials
        echo "$targets_array" | while read -r target; do
          case "$target" in
            "quay.io")
              if [ "${{ inputs.quayio_available }}" = "true" ]; then
                echo "[✓] Quay.io: Will push to quay.io/pawsey/${IMAGE_NAME}:${VERSION}"
              else
                echo "[skip] Quay.io: Requested in manifest but credentials not available"
              fi
              ;;
            "quayio-pawseysc")
              if [ "${{ inputs.quayiosc_available }}" = "true" ]; then
                echo "[✓] Quay.io (pawseysc): Will push to quay.io/pawseysc/${IMAGE_NAME}:${VERSION}"
              else
                echo "[skip] Quay.io (pawseysc): Requested in manifest but credentials not available"
              fi
              ;;
            "setonix-registry")
              if [ "${{ inputs.setonixreg_available }}" = "true" ]; then
                echo "[✓] Setonix Public Registry: Will push to setonix-registry.pawsey.org.au/pawsey/${IMAGE_NAME}:${VERSION}"
              else
                echo "[skip] Setonix Registry: Requested in manifest but credentials not available"
              fi
              ;;
            *)
              echo "[skip] Unknown target: $target"
              ;;
          esac
        done
        echo ""

    - name: Configure podman environment
      if: inputs.quayio_available == 'true' || inputs.quayiosc_available == 'true' || inputs.setonixreg_available == 'true'
      run: |
        echo "Setting up container environment variables for public push..."

        # Export environment variables (same as BUILD-job)
        # Per-runner isolation so multiple runners (even on one machine) never
        # share a rootless-podman store. RID = stable fs-safe hash of the runner name.
        RID=$(printf '%s' "${RUNNER_NAME:-default}" | sha1sum | cut -c1-12)
        echo "RID=${RID}" >> $GITHUB_ENV
        export XDG_DATA_HOME=/container/${USER}/data-${RID}
        export XDG_RUNTIME_DIR=/container/${USER}/runtime-${RID}
        export TMPDIR=/container/${USER}/tmp-${RID}/

        # Create required directories
        mkdir -p ${XDG_DATA_HOME}
        mkdir -p ${XDG_RUNTIME_DIR}
        mkdir -p ${TMPDIR}

        echo "Public push environment setup completed:"
        echo "XDG_DATA_HOME: ${XDG_DATA_HOME}"
        echo "XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}"
        echo "TMPDIR: ${TMPDIR}"

        # Set environment variables for subsequent steps
        echo "XDG_DATA_HOME=${XDG_DATA_HOME}" >> $GITHUB_ENV
        echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}" >> $GITHUB_ENV
        echo "TMPDIR=${TMPDIR}" >> $GITHUB_ENV

    - name: Download archive and load to podman
      id: locate_and_load
      if: inputs.quayio_available == 'true' || inputs.quayiosc_available == 'true' || inputs.setonixreg_available == 'true'
      uses: ./.github/actions/setup-rclone
      with:
        access_key_id: ${{ secrets.ACACIA_ACCESS_KEY_ID }}
        secret_access_key: ${{ secrets.ACACIA_SECRET_ACCESS_KEY }}
        endpoint: https://projects.pawsey.org.au
        bucket: ${{ vars.ACACIA_BUCKETNAME }}
        destination_path: ${{ env.IMAGE_NAME }}_${{ env.VERSION }}.tar
        download_mode: true
        dockerfile_name: ${{ env.IMAGE_NAME }}
        version: ${{ env.VERSION }}
        load_to_podman: true

    - name: Initialize Docker configuration
      if: inputs.quayio_available == 'true' || inputs.quayiosc_available == 'true' || inputs.setonixreg_available == 'true'
      run: |
        mkdir -p ~/.docker
        echo "Created Docker config directory: ~/.docker"


    # ============================================
    # Quay.io Push (Only if in targets)
    # ============================================
    - name: Push to Quay.io public registry
      id: push_quayio
      if: inputs.quayio_available == 'true' && contains(inputs.targets, 'quay.io')
      run: |
        set -euo pipefail
        echo "=========================================="
        echo " Quay.io Push Process"
        echo "=========================================="

        retry() {
          local attempts="$1"; local delay="$2"; shift 2
          local n=1
          until "$@"; do
            if [ "$n" -ge "$attempts" ]; then
              echo "✗ Command failed after $n attempts: $*"
              return 1
            fi
            echo "↻ Attempt $n failed; retrying in ${delay}s…"
            sleep "$delay"
            n=$((n+1))
            delay=$((delay*2))
          done
        }

        echo "🔐 Logging into Quay.io..."
        retry 3 5 podman login quay.io \
          -u "${{ vars.QUAYIO_USERNAME }}" -p "${{ secrets.QUAYIO_TOKEN }}" \
          || { echo "✗ Quay.io login failed"; exit 1; }

        image_tag="${{ steps.locate_and_load.outputs.image_tag }}"
        quayio_tag="quay.io/pawsey/${IMAGE_NAME}:${VERSION}"
        echo "🏷️  Tagging $image_tag → $quayio_tag"
        podman tag "$image_tag" "$quayio_tag" || { echo "✗ Image tagging failed"; exit 1; }

        echo "📤 Pushing to Quay.io (with retry)…"
        retry 4 10 podman push "$quayio_tag" \
          || { echo "❌ Failed to push to Quay.io"; exit 1; }
        echo "✅ Pushed: $quayio_tag"

        # Repository visibility is intentionally NOT auto-flipped to public
        # here. Previously every successful push called `changevisibility`,
        # which let an unauth uploader force any pawsey/* repo public on
        # first push. Visibility for new repos must be set out-of-band by
        # an org admin or a separate, server-trusted job.
        echo "Skipping automatic visibility flip (manual / admin-only)."

    # ============================================
    # Quay.io pawseysc org Push (Only if in targets)
    # ============================================
    - name: Push to Quay.io (pawseysc) public registry
      id: push_quayiosc
      # Run independently of the pawsey Quay.io result so one org failure doesn't mask the other.
      if: always() && inputs.quayiosc_available == 'true' && contains(inputs.targets, 'quayio-pawseysc')
      run: |
        set -euo pipefail
        echo "=========================================="
        echo " Quay.io (pawseysc) Push Process"
        echo "=========================================="

        retry() {
          local attempts="$1"; local delay="$2"; shift 2
          local n=1
          until "$@"; do
            if [ "$n" -ge "$attempts" ]; then
              echo "✗ Command failed after $n attempts: $*"
              return 1
            fi
            echo "↻ Attempt $n failed; retrying in ${delay}s…"
            sleep "$delay"
            n=$((n+1))
            delay=$((delay*2))
          done
        }

        echo "🔐 Logging into Quay.io (pawseysc)..."
        retry 3 5 podman login quay.io \
          -u "${{ vars.QUAYIO_SC_USERNAME || vars.QUAYIO_USERNAME }}" -p "${{ secrets.QUAYIO_SC_TOKEN }}" \
          || { echo "✗ Quay.io (pawseysc) login failed"; exit 1; }

        image_tag="${{ steps.locate_and_load.outputs.image_tag }}"
        quayiosc_tag="quay.io/pawseysc/${IMAGE_NAME}:${VERSION}"
        echo "🏷️  Tagging $image_tag → $quayiosc_tag"
        podman tag "$image_tag" "$quayiosc_tag" || { echo "✗ Image tagging failed"; exit 1; }

        echo "📤 Pushing to Quay.io pawseysc (with retry)…"
        retry 4 10 podman push "$quayiosc_tag" \
          || { echo "❌ Failed to push to Quay.io pawseysc"; exit 1; }
        echo "✅ Pushed: $quayiosc_tag"

    # ============================================
    # Setonix Public Registry Push (Only if in targets)
    # ============================================
    - name: Push to Setonix public registry
      id: push_setonix_public
      # Run independently of Quay.io result so a single registry failure doesn't mask the other.
      if: always() && inputs.setonixreg_available == 'true' && contains(inputs.targets, 'setonix-registry')
      run: |
        set -euo pipefail
        echo "=========================================="
        echo " Setonix Public Registry Push Process"
        echo "=========================================="

        retry() {
          local attempts="$1"; local delay="$2"; shift 2
          local n=1
          until "$@"; do
            if [ "$n" -ge "$attempts" ]; then
              echo "✗ Command failed after $n attempts: $*"
              return 1
            fi
            echo "↻ Attempt $n failed; retrying in ${delay}s…"
            sleep "$delay"
            n=$((n+1))
            delay=$((delay*2))
          done
        }

        echo "🔐 Logging into Setonix Registry..."
        retry 3 5 podman login https://setonix-registry.pawsey.org.au \
          -u "${{ vars.SETONIXREG_USERNAME }}" -p "${{ secrets.SETONIXREG_PASS }}" \
          || { echo "✗ Setonix Registry login failed"; exit 1; }

        image_tag="${{ steps.locate_and_load.outputs.image_tag }}"
        setonix_public_tag="setonix-registry.pawsey.org.au/pawsey/${IMAGE_NAME}:${VERSION}"
        echo "🏷️  Tagging $image_tag → $setonix_public_tag"
        podman tag "$image_tag" "$setonix_public_tag" || { echo "✗ Image tagging failed"; exit 1; }

        echo "📤 Pushing to Setonix Public Registry (with retry)…"
        retry 4 10 podman push "$setonix_public_tag" \
          || { echo "❌ Failed to push to Setonix Public Registry"; exit 1; }
        echo "✅ Pushed: $setonix_public_tag"

    - name: Clean up podman images
      if: always() && (inputs.quayio_available == 'true' || inputs.quayiosc_available == 'true' || inputs.setonixreg_available == 'true')
      run: |
        echo "🧹 Cleaning up local images..."
        image_tag="${{ steps.locate_and_load.outputs.image_tag }}"

        # Remove original image
        echo "Removing base image: $image_tag"
        podman rmi "$image_tag" 2>/dev/null || echo "  (Base image already removed or not found)"

        # Remove tagged images based on targets (IMAGE_NAME already includes variant suffix from BUILD-job)
        if [ "${{ inputs.quayio_available }}" = "true" ] && echo '${{ inputs.targets }}' | jq -e 'contains(["quay.io"])' > /dev/null; then
          quayio_tag="quay.io/pawsey/${IMAGE_NAME}:${VERSION}"
          echo "Removing Quay.io tag: $quayio_tag"
          podman rmi "$quayio_tag" 2>/dev/null || echo "  (Quay.io tag already removed or not found)"
        fi

        if [ "${{ inputs.quayiosc_available }}" = "true" ] && echo '${{ inputs.targets }}' | jq -e 'contains(["quayio-pawseysc"])' > /dev/null; then
          quayiosc_tag="quay.io/pawseysc/${IMAGE_NAME}:${VERSION}"
          echo "Removing Quay.io pawseysc tag: $quayiosc_tag"
          podman rmi "$quayiosc_tag" 2>/dev/null || echo "  (Quay.io pawseysc tag already removed or not found)"
        fi

        if [ "${{ inputs.setonixreg_available }}" = "true" ] && echo '${{ inputs.targets }}' | jq -e 'contains(["setonix-registry"])' > /dev/null; then
          setonix_public_tag="setonix-registry.pawsey.org.au/pawsey/${IMAGE_NAME}:${VERSION}"
          echo "Removing Setonix Public tag: $setonix_public_tag"
          podman rmi "$setonix_public_tag" 2>/dev/null || echo "  (Setonix Public tag already removed or not found)"
        fi

        echo "✅ Local image cleanup completed"
